name: Bug report
description: File a bug report
title: "[Bug]: "
labels: ["type:bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! The more details you provide, the faster we can fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug you encountered.
      placeholder: Ex: The 'Submit' button does not change color when hovered.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a step-by-step guide on how to reproduce the bug.
      placeholder: |
        1. Go to...
        2. Click on...
        3. See the error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what you expected the UI component library to do.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what actually happened when you encountered the bug.
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package version(s)
      placeholder: Ex: @dt-dds/core@1.2.3
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Ex: macOS Ventura, Windows 11
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser name and version
      placeholder: Ex: Chrome 120, Safari 17
    validations:
      required: true

  - type: screenshots
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or videos that illustrate the problem.
    validations:
      required: false

  - type: textarea
    id: possible-solution
    attributes:
      label: Possible solution
      description: If you have any ideas or suggestions for how to fix the bug, mention them here.
    validations:
      required: false
